  <style>
    /* ── Preloader ─────────────────────────────────────────────── */
    #root-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      z-index: 9999;
      transition: opacity 0.45s ease, visibility 0.45s ease;
      overflow: hidden;
    }
    #root-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Grid overlay */
    #root-loader::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(22,163,74,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,163,74,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Radial glow behind logo */
    .rl-glow {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22,163,74,0.18) 0%, transparent 70%);
      pointer-events: none;
      animation: rl-pulse-glow 2.4s ease-in-out infinite;
    }
    @keyframes rl-pulse-glow {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1;   }
    }

    /* Outer ring */
    .rl-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid rgba(22,163,74,0.2);
      animation: rl-ring-expand 2.4s ease-in-out infinite;
    }
    .rl-ring-2 {
      width: 300px;
      height: 300px;
      animation-delay: 0.4s;
      border-color: rgba(22,163,74,0.1);
    }
    @keyframes rl-ring-expand {
      0%   { transform: scale(0.85); opacity: 0; }
      40%  { opacity: 1; }
      100% { transform: scale(1.15); opacity: 0; }
    }

    /* Floating dots */
    .rl-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #16a34a;
      opacity: 0;
      animation: rl-float 3s ease-in-out infinite;
    }
    .rl-dot:nth-child(1){ top:18%; left:22%; animation-delay:0s;    width:5px; height:5px; background:#22c55e; }
    .rl-dot:nth-child(2){ top:25%; right:20%; animation-delay:0.6s; width:4px; height:4px; }
    .rl-dot:nth-child(3){ bottom:22%; left:30%; animation-delay:1.2s; width:7px; height:7px; background:#4ade80; }
    .rl-dot:nth-child(4){ bottom:18%; right:25%; animation-delay:0.9s; width:4px; height:4px; }
    .rl-dot:nth-child(5){ top:45%; left:10%; animation-delay:1.8s; width:5px; height:5px; }
    .rl-dot:nth-child(6){ top:40%; right:10%; animation-delay:0.3s; width:6px; height:6px; background:#22c55e; }
    @keyframes rl-float {
      0%,100% { transform: translateY(0)  scale(1);   opacity: 0;   }
      25%      { opacity: 0.7; }
      50%      { transform: translateY(-18px) scale(1.2); opacity: 0.9; }
      75%      { opacity: 0.5; }
    }

    /* Logo container */
    .rl-logo-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: rl-fade-up 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rl-fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rl-logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(22,163,74,0.5));
      animation: rl-logo-pulse 2s ease-in-out infinite;
    }
    @keyframes rl-logo-pulse {
      0%,100% { filter: drop-shadow(0 0 18px rgba(22,163,74,0.45)); }
      50%      { filter: drop-shadow(0 0 36px rgba(34,197,94,0.75)); }
    }

    /* Word mark */
    .rl-name {
      font-family: 'Fredoka', sans-serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #ffffff;
      margin-bottom: -12px;
    }
    .rl-name span { color: #22c55e; }

    .rl-tagline {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    /* Progress bar */
    .rl-bar-track {
      width: 200px;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-top: 4px;
    }
    .rl-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #16a34a, #4ade80);
      box-shadow: 0 0 10px rgba(34,197,94,0.6);
      animation: rl-progress 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes rl-progress {
      0%   { width: 0%;   }
      60%  { width: 75%;  }
      85%  { width: 88%;  }
      100% { width: 100%; }
    }

    /* Shimmer sweep on bar */
    .rl-bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
      animation: rl-shimmer 1.4s linear infinite;
    }
    .rl-bar-track { position: relative; }
    @keyframes rl-shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(200%); }
    }
  </style>
